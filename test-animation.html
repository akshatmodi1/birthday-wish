<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Wish Animation</title>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Lato:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d0020;
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Lato', sans-serif;
    }

    #trigger {
      padding: 1rem 2.8rem;
      background: linear-gradient(135deg, #ce93d8, #f48fb1);
      color: #fff; border: none; border-radius: 2rem;
      font-size: 1.2rem; font-family: 'Lato', sans-serif;
      cursor: pointer; letter-spacing: 0.04em;
      box-shadow: 0 4px 28px rgba(206,147,216,0.5);
      transition: transform 0.2s, box-shadow 0.2s;
    }
    #trigger:hover { transform: scale(1.06); box-shadow: 0 6px 36px rgba(206,147,216,0.7); }

    /* ── Overlay ── */
    #overlay {
      position: fixed; inset: 0; z-index: 9999;
      background: #000008;
      opacity: 0; visibility: hidden;
      transition: opacity 0.8s ease;
    }
    #overlay.show  { opacity: 1; visibility: visible; }
    #overlay.hide  { opacity: 0; }

    #cv { position: absolute; inset: 0; width: 100%; height: 100%; display: block; }

    /* ── Text ── */
    #msg {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 1.2rem; padding: 2rem;
      text-align: center; pointer-events: none;
    }
    #msg p { opacity: 0; transform: translateY(22px); transition: opacity 1s ease, transform 1s ease; }
    #msg p.on { opacity: 1; transform: translateY(0); }

    #t1 { font-family: 'Dancing Script', cursive; font-size: clamp(1.6rem,5vw,2.8rem); color: #e8d5ff; }
    #t2 { font-family: 'Dancing Script', cursive; font-size: clamp(2.2rem,7vw,4rem);   color: #f8bbd9;
          text-shadow: 0 0 40px rgba(248,187,217,0.8), 0 0 80px rgba(248,187,217,0.4); }
    #t3 { font-family: 'Lato', sans-serif; font-size: clamp(0.85rem,2vw,1.1rem);
          color: rgba(255,255,255,0.4); letter-spacing: 0.15em; text-transform: uppercase; }
  </style>
</head>
<body>

<button id="trigger" onclick="Wish.play()">Send Wish ✨</button>

<div id="overlay">
  <canvas id="cv"></canvas>
  <div id="msg">
    <p id="t1">Your wish is on its way… 🌠</p>
    <p id="t2">Received by the Universe 🌌</p>
    <p id="t3">may the stars make it come true ✨</p>
  </div>
</div>

<script>
const Wish = (() => {

  /* ── Config ── */
  const CFG = {
    BURST_COUNT : 500,   // explosion particles on open
    STAR_COUNT  : 350,   // ambient twinkling stars
    COMET_COUNT : 7,     // shooting comets
    AURORA_BANDS: 3,     // aurora wave layers
    DURATION    : 7500,  // ms before fade-out
    COLORS      : ['#f8bbd9','#ce93d8','#bbdefb','#e1bee7','#ffe0f0','#d4aaff'],
  };

  let cv, ctx, W, H, raf;
  let stars=[], bursts=[], comets=[], auroras=[];
  let t0 = 0;

  /* ── Helpers ── */
  const rnd  = (a,b) => a + Math.random()*(b-a);
  const pick = arr  => arr[Math.floor(Math.random()*arr.length)];

  /* ── Star ── */
  function mkStar() {
    return { x:rnd(0,W), y:rnd(0,H), r:rnd(0.3,1.8),
             a:Math.random(), spd:rnd(0.003,0.015), grow:Math.random()>0.5,
             col:pick(CFG.COLORS) };
  }

  /* ── Burst particle (explosion on start) ── */
  function mkBurst() {
    const angle = Math.random()*Math.PI*2;
    const spd   = rnd(2, 13);
    return { x:W/2, y:H/2,
             vx: Math.cos(angle)*spd, vy: Math.sin(angle)*spd,
             r: rnd(2,5.5), a:1, decay:rnd(0.004,0.012),
             col:pick(CFG.COLORS), trail:[], maxTrail:14 };
  }

  /* ── Comet ── */
  function mkComet(i) {
    const fromTop = Math.random() > 0.5;
    return {
      x: fromTop ? rnd(W*0.1, W*0.9) : -80,
      y: fromTop ? -80 : rnd(H*0.05, H*0.55),
      dx: fromTop ? rnd(2,5)  : rnd(6,11),
      dy: fromTop ? rnd(6,10) : rnd(1.5,4),
      len: rnd(120,240), width:rnd(1.2,2.8),
      col: pick(CFG.COLORS), a:0, glow:rnd(5,12),
      delay: 800 + i*350, active:false, done:false
    };
  }

  /* ── Aurora band ── */
  function mkAurora(i) {
    return {
      y: H * (0.25 + i*0.22),
      amp: rnd(30,70), freq: rnd(0.003,0.007),
      phase: Math.random()*Math.PI*2,
      spd: rnd(0.004,0.009),
      col: CFG.COLORS[i % CFG.COLORS.length],
      alpha: 0
    };
  }

  /* ── Draw frame ── */
  function draw(ts) {
    if (!t0) t0 = ts;
    const elapsed = ts - t0;

    ctx.clearRect(0,0,W,H);

    /* 1 ── Aurora waves (appear after 600ms) ── */
    const auroraAlpha = Math.min(1, Math.max(0,(elapsed-600)/1200));
    auroras.forEach(au => {
      au.phase += au.spd;
      au.alpha  = auroraAlpha * 0.18;
      const grad = ctx.createLinearGradient(0, au.y - au.amp, 0, au.y + au.amp);
      grad.addColorStop(0,   'rgba(0,0,0,0)');
      grad.addColorStop(0.5, hexAlpha(au.col, au.alpha));
      grad.addColorStop(1,   'rgba(0,0,0,0)');
      ctx.beginPath();
      ctx.moveTo(0, au.y);
      for (let x=0; x<=W; x+=4) {
        ctx.lineTo(x, au.y + Math.sin(x*au.freq + au.phase)*au.amp);
      }
      ctx.lineTo(W, H); ctx.lineTo(0, H); ctx.closePath();
      ctx.fillStyle = grad;
      ctx.fill();
    });

    /* 2 ── Twinkling stars ── */
    stars.forEach(s => {
      s.a += s.grow ? s.spd : -s.spd;
      if (s.a>=1){s.a=1;s.grow=false;}
      if (s.a<=0){s.a=0;s.grow=true;}
      if (s.r>1.1){ ctx.shadowColor=s.col; ctx.shadowBlur=6; }
      ctx.beginPath();
      ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(255,255,255,${s.a.toFixed(3)})`;
      ctx.fill();
      ctx.shadowBlur=0;
    });

    /* 3 ── Burst particles ── */
    bursts.forEach(b => {
      if (b.a<=0) return;
      b.trail.push({x:b.x,y:b.y,a:b.a});
      if (b.trail.length>b.maxTrail) b.trail.shift();
      // Draw trail
      b.trail.forEach((pt,i) => {
        const ta = pt.a*(i/b.trail.length)*0.4;
        ctx.beginPath();
        ctx.arc(pt.x,pt.y,b.r*(i/b.trail.length),0,Math.PI*2);
        ctx.fillStyle=hexAlpha(b.col,ta);
        ctx.fill();
      });
      // Draw head
      ctx.beginPath();
      ctx.arc(b.x,b.y,b.r,0,Math.PI*2);
      ctx.shadowColor=b.col; ctx.shadowBlur=b.r*4;
      ctx.fillStyle=hexAlpha(b.col,b.a);
      ctx.fill();
      ctx.shadowBlur=0;
      // Physics
      b.x+=b.vx; b.y+=b.vy;
      b.vx*=0.97; b.vy*=0.97;
      b.vy+=0.04; // gentle gravity
      b.a-=b.decay;
    });

    /* 4 ── Comets ── */
    comets.forEach(c => {
      if (!c.active||c.done) return;
      const fadeZone=80;
      if (c.x<fadeZone&&c.y<fadeZone)       c.a=Math.min(1,c.a+0.07);
      else if (c.x>W-fadeZone||c.y>H-fadeZone) c.a=Math.max(0,c.a-0.05);
      else                                   c.a=Math.min(1,c.a+0.05);
      c.x+=c.dx; c.y+=c.dy;
      if (c.x>W+c.len&&c.y>H+c.len){c.done=true;return;}
      // Trail
      const tx=c.x-c.len*(c.dx/(c.dx+c.dy));
      const ty=c.y-c.len*(c.dy/(c.dx+c.dy));
      const g=ctx.createLinearGradient(tx,ty,c.x,c.y);
      g.addColorStop(0,'rgba(255,255,255,0)');
      g.addColorStop(0.5,`rgba(255,255,255,${(c.a*0.25).toFixed(3)})`);
      g.addColorStop(1,  `rgba(255,255,255,${c.a.toFixed(3)})`);
      ctx.beginPath(); ctx.moveTo(tx,ty); ctx.lineTo(c.x,c.y);
      ctx.strokeStyle=g; ctx.lineWidth=c.width; ctx.lineCap='round'; ctx.stroke();
      // Head
      ctx.beginPath(); ctx.arc(c.x,c.y,c.glow*0.45,0,Math.PI*2);
      ctx.fillStyle=c.col; ctx.shadowColor=c.col; ctx.shadowBlur=c.glow*3;
      ctx.globalAlpha=c.a*0.95; ctx.fill();
      ctx.globalAlpha=1; ctx.shadowBlur=0;
      // Sparkle debris
      for(let i=0;i<3;i++){
        ctx.beginPath();
        ctx.arc(c.x+rnd(-18,18),c.y+rnd(-18,18),rnd(0.3,1.3),0,Math.PI*2);
        ctx.fillStyle=`rgba(255,255,255,${rnd(0.1,0.6)*c.a})`;
        ctx.fill();
      }
    });

    raf=requestAnimationFrame(draw);
  }

  /* ── Hex + alpha helper ── */
  function hexAlpha(hex, a) {
    const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
    return `rgba(${r},${g},${b},${a.toFixed(3)})`;
  }

  /* ── Show text ── */
  function showText() {
    [['t1',300],['t2',1900],['t3',3000]].forEach(([id,ms])=>{
      setTimeout(()=>{ const el=document.getElementById(id); if(el) el.classList.add('on'); },ms);
    });
  }

  /* ── Reset ── */
  function reset() {
    ['t1','t2','t3'].forEach(id=>{ const el=document.getElementById(id); if(el) el.classList.remove('on'); });
    document.getElementById('overlay').classList.remove('hide');
  }

  /* ── Public play() ── */
  function play() {
    cv  = document.getElementById('cv');
    ctx = cv.getContext('2d');
    W   = cv.width  = window.innerWidth;
    H   = cv.height = window.innerHeight;
    t0  = 0;

    reset();

    stars   = Array.from({length:CFG.STAR_COUNT},  mkStar);
    bursts  = Array.from({length:CFG.BURST_COUNT},  mkBurst);
    comets  = Array.from({length:CFG.COMET_COUNT},  (_,i)=>mkComet(i));
    auroras = Array.from({length:CFG.AURORA_BANDS}, (_,i)=>mkAurora(i));

    // Stagger comet activation
    comets.forEach(c => setTimeout(()=>{ c.active=true; }, c.delay));

    const ov = document.getElementById('overlay');
    ov.classList.add('show');
    document.body.style.overflow='hidden';

    if (raf) cancelAnimationFrame(raf);
    raf = requestAnimationFrame(draw);

    showText();

    // Fade out
    setTimeout(()=>{
      ov.classList.add('hide');
      cancelAnimationFrame(raf);
      ov.addEventListener('transitionend', function done(){
        ov.removeEventListener('transitionend',done);
        ov.classList.remove('show','hide');
        document.body.style.overflow='';
      },{once:true});
    }, CFG.DURATION);
  }

  return { play, CFG };
})();
</script>
</body>
</html>
